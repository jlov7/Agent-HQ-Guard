name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
      - uses: pnpm/action-setup@v6.0.8
      - run: pnpm install --frozen-lockfile
      - run: pnpm store prune
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: coverage
          if-no-files-found: ignore
          path: |
            app/coverage
            lib/policy/coverage
            lib/provenance/coverage
            action/coverage
            cli/coverage
      - run: pnpm security

  build-images:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
      - uses: pnpm/action-setup@v6.0.8
      - run: pnpm install --frozen-lockfile
      - run: pnpm store prune
      - run: pnpm build
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: syft-json
          output-file: sbom.json
          upload-artifact: false
          syft-version: v1.44.0
      - uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Cosign Sign
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign version
          cosign sign-blob --yes --oidc-issuer https://token.actions.githubusercontent.com --output-signature sbom.sig sbom.json
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: |
            sbom.json
            sbom.sig

  publish-docs:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Publish Docs
        run: |
          echo "Docs publication placeholder"
